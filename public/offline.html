<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Desa Cibatu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .offline-container {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        .offline-title {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .offline-message {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            line-height: 1.6;
        }

        .retry-button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .retry-button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .status-indicator {
            margin-top: 1rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @media (max-width: 600px) {
            .offline-container {
                margin: 1rem;
                padding: 1.5rem;
            }

            .offline-title {
                font-size: 1.5rem;
            }

            .offline-message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon pulse">📡</div>
        <h1 class="offline-title">Tidak Ada Koneksi Internet</h1>
        <p class="offline-message">
            Maaf, Anda sedang offline. Periksa koneksi internet Anda dan coba lagi.
            <br><br>
            Beberapa fitur mungkin masih dapat diakses dari cache offline.
        </p>
        <button class="retry-button" onclick="window.location.reload()">
            🔄 Coba Lagi
        </button>
        <div class="status-indicator">
            Status: <span id="status">Mengecek koneksi...</span>
        </div>
    </div>

    <script>
        // Cek status koneksi
        function checkConnection() {
            const statusElement = document.getElementById('status');

            if (navigator.onLine) {
                statusElement.textContent = 'Online - Mengalihkan...';
                statusElement.style.color = '#4ade80';

                // Tunggu sebentar lalu redirect ke halaman utama
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            } else {
                statusElement.textContent = 'Offline';
                statusElement.style.color = '#f87171';
            }
        }

        // Cek koneksi saat halaman dimuat
        checkConnection();

        // Cek koneksi saat status berubah
        window.addEventListener('online', () => {
            checkConnection();
        });

        window.addEventListener('offline', () => {
            checkConnection();
        });

        // Cek koneksi setiap 5 detik
        setInterval(checkConnection, 5000);

        // Tambahkan keyboard shortcut untuk retry
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                window.location.reload();
            }
        });
    </script>
</body>
</html>
